# Rate limiting zones (must be in http context, before server block)
limit_req_zone $binary_remote_addr zone=logging:10m rate=30r/m;

# Main server block for the web application
server {
    listen 80; # Listen on the standard HTTP port
    server_name localhost; # Domain name (e.g., your_domain.com in production)
    root /var/www/html; # Root directory for web files
    index index.php index.html; # Default files to serve for directory requests

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Rate-limited public logging endpoints
    location ~ ^/log_(rating|cookie_consent)\.php$ {
        limit_req zone=logging burst=10 nodelay;

        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Basic auth for the stats dashboard (/stats and /stats.php)
    location ~ ^/stats(\.php)?$ {
        auth_basic "Festival Statistics";
        auth_basic_user_file /etc/nginx/.htpasswd_stats;

        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/stats.php;
        include fastcgi_params;
    }

    # Basic auth for the admin panel (/admin, /admin.php, /admin_api, /admin_api.php)
    location ~ ^/admin(_api)?(\.php)?$ {
        auth_basic "Admin Panel";
        auth_basic_user_file /etc/nginx/.htpasswd_admin;

        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/admin$1.php;
        include fastcgi_params;
    }

    # PHP processing block
    # Forwards all .php requests to the PHP-FPM service
    location ~ \.php$ {
        # Splits the URI into SCRIPT_FILENAME and PATH_INFO for PHP-FPM
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Checks if the PHP script exists; returns a 404 error if not found
        try_files $fastcgi_script_name =404;

        # Forwards the request to the PHP-FPM service (e.g., container "php" on port 9000)
        fastcgi_pass php:9000;

        # Defines the SCRIPT_FILENAME parameter required by PHP-FPM
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Includes standard FastCGI configuration parameters
        include fastcgi_params;

        # Passes the PATH_INFO variable for application-side routing
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Favicon handling: fallback to a PNG icon or return "No Content" (204)
    location /favicon.ico {
        try_files /images/icon-192.png =204;
    }
    
    # General request handling (static files and application fallback)
    location / {
        # Attempts to serve request as a file, then a directory; falls back to index.php
        try_files $uri $uri/ /index.php?$args;
    }

    # Security: Deny access to temporary/backup files (e.g., ending in ~)
    location ~ ~$ {
        deny all;
    }

    # Data directory access (specifically for beers.json)
    location /data/ {
        autoindex off; # Disable directory listing for security
    }

    # Backup beer data files require admin auth
    location ~ ^/data/beers-.*\.json$ {
        auth_basic "Admin Panel";
        auth_basic_user_file /etc/nginx/.htpasswd_admin;
    }

    # Excluded raters list requires admin auth
    location = /data/excluded_raters.json {
        auth_basic "Admin Panel";
        auth_basic_user_file /etc/nginx/.htpasswd_admin;
    }
}
