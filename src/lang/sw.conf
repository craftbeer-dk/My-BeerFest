; Privacy Policy Page
privacy_policy_title = "Integritetspolicy för My Beerfest"
privacy_policy_heading = "Integritetspolicy för My Beerfest"
privacy_policy_intro = "Denna integritetspolicy beskriver hur My Beerfest ('vi', 'oss', 'vår') samlar in, använder och skyddar din information när du använder vår webbapplikation ('Appen'). Vi är förpliktigade att skydda din integritet och behandla dina data i enlighet med gällande dataskyddslagstiftning, inklusive GDPR."
data_collection_heading = "1. Vilken information samlar vi in?"
local_storage_heading = "1.1 Information sparad lokalt i din webbläsare (Nödvändig funktionalitet)"
local_storage_description = "För att appen ska fungera sparar vi följande data direkt i din webbläsares lokala lagring (localStorage). Denna information lämnar aldrig din enhet och är absolut nödvändig för appens funktionalitet:"
beer_ratings_label = "Ölbetyg & Favoriter:"
beer_ratings_desc = "Dina personliga betyg på öl (från 0.25 till 5.0) samt dina markeringar av favoritöl."
filter_sort_choices_label = "Filtrerings- och sorteringsval:"
filter_sort_choices_desc = "Dina senaste val för filtrering och sortering av öllistan, så att appen kommer ihåg dina preferenser."
server_data_heading = "1.2 Information insamlad på servern (Valfri statistik)"
server_data_intro = "Om du ger ditt samtycke samlar vi in följande anonymiserad/pseudonymiserad information för att förbättra appen och festivalen:"
session_id_label = "Sessions-ID:"
session_id_desc = "Ett unikt, anonymt ID som genereras för din webbläsarsession. Detta ID används för att gruppera dina betyg inom en enskild session, utan att vi kan identifiera dig."
beer_id_name_label = "Öl-ID, öl-namn och betyg:"
beer_id_name_desc = "Identifikationen av den öl du betygsätter, samt det givna betyget."
timestamp_label = "Tidpunkt:"
timestamp_desc = "Tidpunkten för betyget."
how_we_use_data_heading = "2. Hur använder vi din information?"
local_storage_use_label = "Lokal lagring (Nödvändig):"
local_storage_use_desc = "Information som sparas lokalt används uteslutande för att ge dig en personlig och ihållande användarupplevelse, så att dina val komms ihåg när du återvänder till appen."
server_stats_use_label = "Server-statistik (Valfri):"
server_stats_use_desc = "De insamlade datan används uteslutande för att analysera appens generella användningsmönster. Till exempel kan vi använda aggregerade data för att identifiera populära öl eller förstå vilka filter som används mest. Dessa data är inte kopplade till dig som person."
cookies_heading = "3. Cookies och lokal lagring"
cookies_main_desc = "Appen använder webbläsarens lokala lagring (localStorage) för att spara dina val. Detta är en standardwebbteknik och är nödvändig för appens funktion. Dessutom används en sessions-cookie för att tilldela ett anonymt sessions-ID om du ger samtycke till statistikinsamling."
data_sharing_heading = "4. Delning av information"
data_sharing_desc = "Vi delar inte dina personuppgifter eller anonymiserade statistikdata med tredje part."
your_rights_heading = "5. Dina rättigheter (GDPR)"
your_rights_intro = "Enligt GDPR har du vissa rättigheter gällande dina personuppgifter:"
right_to_access_label = "Rätt till tillgång:"
right_to_access_desc = "Du kan se dina lokalt sparade data direkt i din webbläsares utvecklarverktyg under 'Application' -> 'Local Storage'."
right_to_rectify_label = "Rätt till rättelse:"
right_to_rectify_desc = "Du kan när som helst ändra dina betyg och favoriter direkt i appen."
right_to_erase_label = "Rätt till radering:"
right_to_erase_desc = "Du kan radera dina lokalt sparade data genom att rensa din webbläsares data för denna webbplats."
right_to_restrict_label = "Rätt till begränsning av behandling:"
right_to_restrict_desc = "Du kan när som helst återkalla ditt samtycke till statistikinsamling via knappen längst ner i appen."
right_to_data_portability_label = "Rätt till dataportabilitet:"
right_to_data_portability_desc = "Du kan exportera dina lokalt sparade data via funktionen 'Kopiera data'."
policy_changes_heading = "6. Ändringar i denna integritetspolicy"
policy_changes_desc = "Vi kan uppdatera denna integritetspolicy från tid till annan. Eventuella ändringar kommer att publiceras på denna sida."
contact_us_heading = "7. Kontakta oss"
contact_us_desc = "Om du har frågor om denna integritetspolicy är du välkommen att kontakta oss."
