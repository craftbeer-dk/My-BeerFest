; Statistics Consent
statistics_consent_text = "Välkommen! Denna app hjälper dig att få överblick över ölfestivalen. Du kan betygsätta och stjärnmarkera öl så att du är väl förberedd för festivalen. Längst ner på sidan kan du importera och exportera dina data för att enkelt byta enhet. Du kan också lägga till sidan som en app på din telefon via 'Lägg till på hemskärmen' i webbläsarens delningsmeny – på iPhone måste detta göras via Safari. Slutligen vill vi fråga om vi får samla in anonym användningsstatistik för att förbättra både appen och ölfestivalen."
