; Privacy Policy Page
privacy_policy_title = "Privatlivspolitik for My Beerfest"
privacy_policy_heading = "Privatlivspolitik for My Beerfest"
privacy_policy_intro = "Denne privatlivspolitik beskriver, hvordan My Beerfest (\"vi\", \"os\", \"vores\") indsamler, bruger og beskytter dine oplysninger, når du bruger vores webapplikation (\"Appen\"). Vi er forpligtet til at beskytte dit privatliv og behandle dine data i overensstemmelse med gældende databeskyttelseslovgivning, herunder General Data Protection Regulation (GDPR)."
data_collection_heading = "1. Hvilke oplysninger indsamler vi?"
local_storage_heading = "1.1 Oplysninger gemt lokalt i din browser (Essentiel funktionalitet)"
local_storage_description = "For at appen kan fungere, gemmer vi følgende data direkte i din browsers lokale lager (localStorage). Disse oplysninger forlader aldrig din enhed og er strengt nødvendige for appens funktionalitet:"
beer_ratings_label = "Ølbedømmelser & Favoritter:"
beer_ratings_desc = "Dine personlige bedømmelser af øl (fra 0.25 til 5.0) samt dine markeringer af favoritøl."
filter_sort_choices_label = "Filtrerings- og sorteringsvalg:"
filter_sort_choices_desc = "Dine seneste valg for filtrering og sortering af øllisten, så appen husker dine præferencer."
server_data_heading = "1.2 Oplysninger indsamlet på serveren (Valgfri statistik)"
server_data_intro = "Hvis du giver samtykke, indsamler vi følgende anonymiserede/pseudonymiserede oplysninger for at forbedre appen og festivalen:"
session_id_label = "Sessions-ID:"
session_id_desc = "Et unikt, anonymt ID, der genereres for din browsersession. Dette ID bruges til at gruppere dine bedømmelser inden for en enkelt session, uden at vi kan identificere dig."
beer_id_name_label = "Øl-ID, Øl-navn og Bedømmelse:"
beer_id_name_desc = "Identifikationen af den øl, du bedømmer, samt den afgivne bedømmelse."
timestamp_label = "Tidspunkt:"
timestamp_desc = "Tidspunktet for bedømmelsen."
how_we_use_data_heading = "2. Hvordan bruger vi dine oplysninger?"
local_storage_use_label = "Lokal lagring (Essentiel):"
local_storage_use_desc = "Oplysninger gemt lokalt bruges udelukkende til at give dig en personlig og vedvarende brugeroplevelse, så dine valg huskes, når du genbesøger appen."
server_stats_use_label = "Server-side statistik (Valgfri):"
server_stats_use_desc = "De indsamlede data bruges udelukkende til at analysere appens generelle brugsmønstre. For eksempel kan vi bruge aggregerede data til at identificere populære øl eller forstå, hvilke filtre der bruges mest. Disse data er ikke knyttet til din person."
cookies_heading = "3. Cookies og Lokal Lagring"
cookies_main_desc = "Appen bruger browserens lokale lager (localStorage) til at gemme dine valg. Dette er en standard webteknologi og er nødvendig for appens funktion. Derudover bruges en sessions-cookie til at tildele et anonymt sessions-ID, hvis du giver samtykke til statistikindsamling."
data_sharing_heading = "4. Deling af oplysninger"
data_sharing_desc = "Vi deler ikke dine personoplysninger eller anonymiserede statistikdata med tredjeparter."
your_rights_heading = "5. Dine rettigheder (GDPR)"
your_rights_intro = "Under GDPR har du visse rettigheder vedrørende dine personoplysninger:"
right_to_access_label = "Ret til indsigt:"
right_to_access_desc = "Du kan se dine lokalt gemte data direkte i din browsers udviklerværktøjer under \"Application\" -> \"Local Storage\"."
right_to_rectify_label = "Ret til berigtigelse:"
right_to_rectify_desc = "Du kan til enhver tid ændre dine bedømmelser og favoritter direkte i appen."
right_to_erase_label = "Ret til sletning:"
right_to_erase_desc = "Du kan slette dine lokalt gemte data ved at rydde din browsers data for denne hjemmeside."
right_to_restrict_label = "Ret til begrænsning af behandling:"
right_to_restrict_desc = "Du kan til enhver tid trække dit samtykke til statistikindsamling tilbage via knappen i bunden af appen."
right_to_data_portability_label = "Ret til dataportabilitet:"
right_to_data_portability_desc = "Du kan eksportere dine lokalt gemte data via \"Kopier link til mine data\"-funktionen."
policy_changes_heading = "6. Ændringer i denne privatlivspolitik"
policy_changes_desc = "Vi kan opdatere denne privatlivspolitik fra tid til anden. Eventuelle ændringer vil blive offentliggjort på denne side."
contact_us_heading = "7. Kontakt os"
contact_us_desc = "Hvis du har spørgsmål til denne privatlivspolitik, er du velkommen til at kontakte os."

