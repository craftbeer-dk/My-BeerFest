; Privacy Policy Page
privacy_policy_title = "Privacy Policy for My Beerfest"
privacy_policy_heading = "Privacy Policy for My Beerfest"
privacy_policy_intro = "This privacy policy describes how My Beerfest ('we', 'us', 'our') collects, uses, and protects your information when you use our web application ('the App'). We are committed to protecting your privacy and processing your data in accordance with applicable data protection laws, including the General Data Protection Regulation (GDPR)."
data_collection_heading = "1. What information do we collect?"
local_storage_heading = "1.1 Information stored locally in your browser (Essential functionality)"
local_storage_description = "For the app to function, we store the following data directly in your browser's local storage (localStorage). This information never leaves your device and is strictly necessary for the app's functionality:"
beer_ratings_label = "Beer Ratings & Favorites:"
beer_ratings_desc = "Your personal beer ratings (from 0.25 to 5.0) as well as your favorite beer markings."
filter_sort_choices_label = "Filtering and sorting choices:"
filter_sort_choices_desc = "Your recent choices for filtering and sorting the beer list, so the app remembers your preferences."
server_data_heading = "1.2 Information collected on the server (Optional statistics)"
server_data_intro = "If you provide consent, we collect the following anonymized/pseudonymized information to improve the app and the festival:"
session_id_label = "Session ID:"
session_id_desc = "A unique, anonymous ID generated for your browser session. This ID is used to group your ratings within a single session without us being able to identify you."
beer_id_name_label = "Beer ID, Beer Name, and Rating:"
beer_id_name_desc = "The identification of the beer you are rating, along with the submitted rating."
timestamp_label = "Timestamp:"
timestamp_desc = "The time of the rating."
how_we_use_data_heading = "2. How do we use your information?"
local_storage_use_label = "Local Storage (Essential):"
local_storage_use_desc = "Information stored locally is used exclusively to provide you with a personal and persistent user experience, ensuring your choices are remembered when you revisit the app."
server_stats_use_label = "Server-side statistics (Optional):"
server_stats_use_desc = "The collected data is used exclusively to analyze the app's general usage patterns. For example, we may use aggregated data to identify popular beers or understand which filters are used most. This data is not linked to you personally."
cookies_heading = "3. Cookies and Local Storage"
cookies_main_desc = "The app uses the browser's local storage (localStorage) to save your choices. This is a standard web technology and is necessary for the app's function. Additionally, a session cookie is used to assign an anonymous session ID if you consent to statistics collection."
data_sharing_heading = "4. Information Sharing"
data_sharing_desc = "We do not share your personal information or anonymized statistical data with third parties."
your_rights_heading = "5. Your Rights (GDPR)"
your_rights_intro = "Under the GDPR, you have certain rights regarding your personal data:"
right_to_access_label = "Right of access:"
right_to_access_desc = "You can view your locally stored data directly in your browser's developer tools under 'Application' -> 'Local Storage'."
right_to_rectify_label = "Right to rectification:"
right_to_rectify_desc = "You can change your ratings and favorites directly in the app at any time."
right_to_erase_label = "Right to erasure:"
right_to_erase_desc = "You can delete your locally stored data by clearing your browser data for this website."
right_to_restrict_label = "Right to restriction of processing:"
right_to_restrict_desc = "You can withdraw your consent for statistics collection at any time via the button at the bottom of the app."
right_to_data_portability_label = "Right to data portability:"
right_to_data_portability_desc = "You can export your locally stored data via the 'Copy data' function."
policy_changes_heading = "6. Changes to this Privacy Policy"
policy_changes_desc = "We may update this privacy policy from time to time. Any changes will be published on this page."
contact_us_heading = "7. Contact Us"
contact_us_desc = "If you have any questions about this privacy policy, please feel free to contact us."
