; Privacy Policy Page
privacy_policy_title = "Personvernerklæring for My Beerfest"
privacy_policy_heading = "Personvernerklæring for My Beerfest"
privacy_policy_intro = "Denne personvernerklæringen beskriver hvordan My Beerfest ('vi', 'oss', 'vår') samler inn, bruker og beskytter dine opplysninger når du bruker vår webapplikasjon ('Appen'). Vi er forpliktet til å beskytte ditt personvern og behandle dine data i samsvar med gjeldende personvernlovgivning, inkludert GDPR."
data_collection_heading = "1. Hvilke opplysninger samler vi inn?"
local_storage_heading = "1.1 Opplysninger lagret lokalt i nettleseren din (Essensiell funksjonalitet)"
local_storage_description = "For at appen skal fungere, lagrer vi følgende data direkte i nettleserens lokale lager (localStorage). Denne informasjonen forlater aldri enheten din og er strengt nødvendig for appens funksjonalitet:"
beer_ratings_label = "Ølvurderinger & Favoritter:"
beer_ratings_desc = "Dine personlige vurderinger av øl (fra 0.25 til 5.0) samt dine markeringer av favorittøl."
filter_sort_choices_label = "Filtrerings- og sorteringsvalg:"
filter_sort_choices_desc = "Dine siste valg for filtrering og sortering av øllisten, slik at appen husker dine preferanser."
server_data_heading = "1.2 Opplysninger innsamlet på serveren (Valgfri statistikk)"
server_data_intro = "Hvis du gir samtykke, samler vi inn følgende anonymiserte/pseudonymiserte opplysninger for å forbedre appen og festivalen:"
session_id_label = "Sesjons-ID:"
session_id_desc = "En unik, anonym ID som genereres for din nettlesersesjon. Denne ID-en brukes til å gruppere dine vurderinger innenfor en enkelt sesjon, uten at vi kan identifisere deg."
beer_id_name_label = "Øl-ID, Øl-navn og Vurdering:"
beer_id_name_desc = "Identifikasjonen av ølet du vurderer, samt den gitte vurderingen."
timestamp_label = "Tidspunkt:"
timestamp_desc = "Tidspunktet for vurderingen."
how_we_use_data_heading = "2. Hvordan bruker vi opplysningene dine?"
local_storage_use_label = "Lokal lagring (Essensiell):"
local_storage_use_desc = "Opplysninger lagret lokalt brukes utelukkende til å gi deg en personlig og vedvarende brukeropplevelse, slik at valgene dine huskes når du besøker appen på nytt."
server_stats_use_label = "Server-side statistikk (Valgfri):"
server_stats_use_desc = "De innsamlede dataene brukes utelukkende til å analysere appens generelle bruksmønstre. For eksempel kan vi bruke aggregerte data til å identifisere populære øl eller forstå hvilke filtre som brukes mest. Disse dataene er ikke knyttet til din person."
cookies_heading = "3. Cookies og Lokal Lagring"
cookies_main_desc = "Appen bruker nettleserens lokale lager (localStorage) til å lagre dine valg. Dette er en standard webteknologi og er nødvendig for appens funksjon. I tillegg brukes en sesjons-cookie til å tildele en anonym sesjons-ID hvis du gir samtykke til statistikkinnsamling."
data_sharing_heading = "4. Deling av opplysninger"
data_sharing_desc = "Vi deler ikke dine personopplysninger eller anonymiserte statistikkdata med tredjeparter."
your_rights_heading = "5. Dine rettigheter (GDPR)"
your_rights_intro = "Under GDPR har du visse rettigheter angående dine personopplysninger:"
right_to_access_label = "Rett til innsyn:"
right_to_access_desc = "Du kan se dine lokalt lagrede data direkte i nettleserens utviklerverktøy under 'Application' -> 'Local Storage'."
right_to_rectify_label = "Rett til retting:"
right_to_rectify_desc = "Du kan når som helst endre dine vurderinger og favoritter direkte i appen."
right_to_erase_label = "Rett til sletting:"
right_to_erase_desc = "Du kan slette dine lokalt lagrede data ved å slette nettleserens data for dette nettstedet."
right_to_restrict_label = "Rett til begrensning av behandling:"
right_to_restrict_desc = "Du kan når som helst trekke tilbake samtykket til statistikkinnsamling via knappen nederst i appen."
right_to_data_portability_label = "Rett til dataportabilitet:"
right_to_data_portability_desc = "Du kan eksportere dine lokalt lagrede data via 'Kopier data'-funksjonen."
policy_changes_heading = "6. Endringer i denne personvernerklæringen"
policy_changes_desc = "Vi kan oppdatere denne personvernerklæringen fra tid til annen. Eventuelle endringer vil bli offentliggjort på denne siden."
contact_us_heading = "7. Kontakt oss"
contact_us_desc = "Hvis du har spørsmål til denne personvernerklæringen, er du velkommen til å kontakte oss."
