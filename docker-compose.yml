
services:
  nginx:
    image: ghcr.io/craftbeer-dk/my-beerfest-nginx:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8181}:80"
    volumes:
      - ./custom:/var/www/html/custom:ro
    environment:
      STATS_USER: ${STATS_USER}
      STATS_PASSWORD: ${STATS_PASSWORD}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      php:
        condition: service_started
    networks:
      - beer_festival_network

  php:
    image: ghcr.io/craftbeer-dk/my-beerfest-php:latest
    restart: unless-stopped
    volumes:
      - ./custom:/var/www/html/custom:ro
      - ./src/data:/var/www/html/data:rw
      - ./logs/:/var/log/mybeerfest:rw
    environment:
      DOMAIN: ${DOMAIN}
      FESTIVAL_TITLE: ${FESTIVAL_TITLE}
      FESTIVAL_TITLE_SHORT: ${FESTIVAL_TITLE_SHORT}
      APP_LANGUAGE: ${APP_LANGUAGE}
      ENABLE_MAINSTYLE_FILTERING: ${ENABLE_MAINSTYLE_FILTERING}
      FESTIVAL_INFO_TEXT: ${FESTIVAL_INFO_TEXT}
      ENABLE_STATISTICS_LOGGING: ${ENABLE_STATISTICS_LOGGING}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
      DEV_MODE: ${DEV_MODE}
      UNTAPPD_RATE_WINDOW: ${UNTAPPD_RATE_WINDOW}
      UNTAPPD_RATE_MAX: ${UNTAPPD_RATE_MAX}
      UNTAPPD_RATE_COOLDOWN: ${UNTAPPD_RATE_COOLDOWN}
      NOT_PUBLIC: ${NOT_PUBLIC}
      NOT_PUBLIC_BYPASS_KEY: ${NOT_PUBLIC_BYPASS_KEY}
      FESTIVAL_DATE: ${FESTIVAL_DATE}
      SHOW_COUNTDOWN: ${SHOW_COUNTDOWN}
    networks:
      - beer_festival_network
    command: sh -c 'for v in DOMAIN FESTIVAL_TITLE FESTIVAL_TITLE_SHORT APP_LANGUAGE ENABLE_MAINSTYLE_FILTERING FESTIVAL_INFO_TEXT ENABLE_STATISTICS_LOGGING CONTACT_EMAIL DEV_MODE UNTAPPD_RATE_WINDOW UNTAPPD_RATE_MAX UNTAPPD_RATE_COOLDOWN NOT_PUBLIC NOT_PUBLIC_BYPASS_KEY FESTIVAL_DATE SHOW_COUNTDOWN; do val=$$(printenv "$$v" 2>/dev/null || true); [ -n "$$val" ] && printf "env[%s] = \"%s\"\n" "$$v" "$$val" >> /usr/local/etc/php-fpm.d/www.conf; done && mkdir -p /var/log/mybeerfest && chown -R www-data:www-data /var/log/mybeerfest && chown -R www-data:www-data /var/www/html/data && php-fpm'

networks:
  beer_festival_network:
    driver: bridge
